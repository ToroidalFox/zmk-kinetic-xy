description: Kinetic XY input processor with per-instance configuration

compatible: "zmk,input-processor-kinetic-xy"

include: ip_zero_param.yaml

properties:
  slot:
    type: int
    required: true
    description: |
      Slot index for this kinetic XY instance. Used to identify
      the instance for toggling.

  event-interval:
    type: int
    required: true
    description: |
      Interval in milliseconds between kinetic simulation ticks.

  decay-rate:
    type: int
    required: true
    description: |
      Decay rate value used by decay function per `event-interval` in per mille.

  clamp-threshold:
    type: int
    required: true
    default: 1
    description: |
      Velocity threshold below which kinetic movement stops.
  trigger-threshold:
    type: int
    required: true
    description:
      Minimum speed needed to start kinetic movement.
