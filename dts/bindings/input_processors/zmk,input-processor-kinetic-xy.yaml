description: Kinetic XY input processor with per-instance configuration

compatible: "zmk,input-processor-kinetic-xy"

include: ip_zero_param.yaml

properties:
  toggle-slot:
    type: int
    required: true
    description: |
      Slot index for this kinetic XY instance. Used to identify
      the instance for toggling.

  touch-button-code:
    type: int
    required: true
    description: |
      Input key code used to detect touch release events,
      typically INPUT_BTN_TOUCH or INPUT_BTN_0.
      On release of this button, if velocity exceeds the threshold,
      kinetic movement begins.

  event-interval:
    type: int
    required: true
    description: |
      Interval in milliseconds between kinetic simulation ticks.

  decay-rate:
    type: int
    required: true
    description: |
      Decay rate value used by decay function per `event-interval` in per mille.
      Should be 0(no friction) to 1000(infinity friction).

  clamp-threshold:
    type: int
    required: true
    default: 1
    description: |
      Velocity threshold below which kinetic movement stops.

  trigger-threshold:
    type: int
    required: true
    description:
      Minimum speed needed to start kinetic movement.
